name: Build

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    build:
        name: Build Smoke Checks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt -r requirements-dev.txt

            - name: Generate version artifacts
              run: python generate_version_info.py

            - name: Generate changelog draft
              run: python regenerate_changelog.py --preview --json

            - name: Run tests when present
              run: |
                  if [ -d tests ]; then
                    pytest -q
                  else
                    echo "No tests directory yet."
                  fi

            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: template-build-artifacts
                  path: |
                      build/version_info.txt
                      build/version_info_updater.txt
                      changelog_draft.json
                  if-no-files-found: ignore
