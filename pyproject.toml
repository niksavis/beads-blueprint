[tool.ruff]
line-length = 100
target-version = "py314"
extend-exclude = [
    ".agents",
    ".beads",
    ".claude",
    ".venv",
    "tools",
    "build",
    "dist",
    "logs",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "PLC"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "basic"
venvPath = "."
venv = ".venv"
exclude = [
    ".agents",
    ".beads",
    ".claude",
    ".venv",
    "tools",
    "build",
    "dist",
    "logs",
    "**/__pycache__",
    "**/node_modules",
    "**/.*",
]
ignore = [".agents", ".beads", ".claude"]

[tool.bandit]
skips = ["B404", "B603", "B607"]
exclude_dirs = [
    ".agents",
    ".beads",
    ".claude",
    ".venv",
    "node_modules",
    "tools",
    "build",
    "dist",
    "tests",
]
